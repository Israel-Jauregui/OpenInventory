version: '3.8'

services:
  db:
    image: postgres:15
    container_name: OpenInventory
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: openPass!!99
      POSTGRES_DB: inventorydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
